<div class="tx-list">
  @for (tx of transactions; track tx.id) {
    <div class="tx-item" [class.deleting]="deletingId() === tx.id">

      <!-- Icon -->
      <div class="tx-icon" [class.income]="tx.type === 'INCOME'" [class.expense]="tx.type === 'EXPENSE'">
        {{ getCategoryIcon(tx.category) }}
      </div>

      <!-- Info -->
      <div class="tx-info">
        <p class="tx-category">{{ tx.category }}</p>
        @if (tx.description) {
          <p class="tx-desc">{{ tx.description }}</p>
        }
        <p class="tx-date">{{ formatDate(tx.date) }}</p>
      </div>

      <!-- Amount + Actions -->
      <div class="tx-right">
        <p class="tx-amount" [class.income]="tx.type === 'INCOME'" [class.expense]="tx.type === 'EXPENSE'">
          {{ tx.type === 'INCOME' ? '+' : '-' }}{{ formatCurrency(tx.amount) }}
        </p>

        @if (confirmDeleteId() === tx.id) {
          <div class="confirm-delete">
            <button class="btn-confirm-yes" (click)="confirmDelete(tx.id)" [disabled]="deletingId() === tx.id">
              @if (deletingId() === tx.id) { ... } @else { ✓ }
            </button>
            <button class="btn-confirm-no" (click)="cancelDelete()">✕</button>
          </div>
        } @else {
          <button class="btn-delete" (click)="askDelete(tx.id)" title="Eliminar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
            </svg>
          </button>
        }
      </div>

    </div>
  }
</div>
